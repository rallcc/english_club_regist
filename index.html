<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Formulir Pendaftaran Resmi English Club SMEA">
    <title>English Club SMEA - Registration</title>
    
    <!-- Open Graph / Link Preview Meta Tags -->
    <meta property="og:title" content="English Club SMEA Registration">
    <meta property="og:description" content="Join English Club SMEA and boost your English skills through fun activities & competitions!">
    <meta property="og:image" content="https://english-club-regist.vercel.app/logo.jpeg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    
    <!-- Google Fonts: Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Supabase JS Client (v2) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f5ff',
                            100: '#e0ebff',
                            500: '#3b82f6',
                            800: '#1e3a8a',
                            900: '#0f172a',
                            accent: '#f59e0b',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-sans text-slate-800 antialiased bg-slate-50 min-h-screen flex flex-col justify-center py-8 sm:py-12 px-4 sm:px-6">

    <!-- Container Card -->
    <main class="w-full max-w-lg mx-auto">
        <div class="bg-white rounded-3xl p-6 sm:p-10 shadow-xl shadow-slate-200/60 border border-slate-200/80">
            
            <!-- Header Section -->
            <header class="text-center mb-8 pb-6 border-b border-slate-100">
                <!-- Logo -->
                <div class="inline-block mb-4">
                    <img src="logo.jpeg" alt="English Club SMEA Logo" 
                         class="w-24 h-24 sm:w-28 sm:h-28 rounded-full object-cover border-2 border-slate-100 shadow-md ring-4 ring-amber-50 mx-auto">
                </div>

                <!-- Badge Tag -->
                <div class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-amber-50 border border-amber-200/80 text-amber-800 text-xs font-semibold uppercase tracking-wider mb-3">
                    <svg class="w-3.5 h-3.5 fill-amber-500" viewBox="0 0 20 20">
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.07 3.292a1 1 0 00.95.69h3.462c.969 0 1.371 1.24.588 1.81l-2.8 2.034a1 1 0 00-.364 1.118l1.07 3.292c.3.921-.755 1.688-1.54 1.118l-2.8-2.034a1 1 0 00-1.175 0l-2.8 2.034c-.784.57-1.838-.197-1.539-1.118l1.07-3.292a1 1 0 00-.364-1.118L2.98 8.72c-.783-.57-.38-1.81.588-1.81h3.461a1 1 0 00.951-.69l1.07-3.292z"/>
                    </svg>
                    Official Member Registration
                </div>

                <!-- Title & Description -->
                <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight">
                    English Club SMEA
                </h1>
                <p class="text-slate-500 text-sm sm:text-base mt-2 leading-relaxed max-w-sm mx-auto">
                    Improve your speaking, confidence, and English skills with exciting activities and competitions!
                </p>
            </header>

            <!-- Status Banner -->
            <div id="statusMessage" class="hidden mb-6 rounded-2xl p-4 text-sm font-medium transition-all duration-300" role="alert"></div>

            <!-- Registration Form -->
            <form id="registrationForm" class="space-y-5" novalidate>
                
                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">
                        Full Name <span class="text-amber-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input type="text" id="fullName" name="fullName" placeholder="e.g. Adelia Putri" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-slate-900 text-sm placeholder-slate-400 focus:bg-white focus:outline-none focus:border-slate-800 focus:ring-2 focus:ring-slate-800/10 transition-all shadow-sm">
                    </div>
                </div>

                <!-- Class -->
                <div>
                    <label for="class" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">
                        Class / Kelas <span class="text-amber-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5m0 0h4m-4 0V9a2 2 0 012-2h2a2 2 0 012 2v12"></path>
                            </svg>
                        </div>
                        <input type="text" id="class" name="class" placeholder="e.g. X AKL 1" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-slate-900 text-sm placeholder-slate-400 focus:bg-white focus:outline-none focus:border-slate-800 focus:ring-2 focus:ring-slate-800/10 transition-all shadow-sm">
                    </div>
                </div>
                
                <!-- Phone Number -->
                <div>
                    <label for="phone" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">
                        WhatsApp Number <span class="text-amber-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                            </svg>
                        </div>
                        <input type="tel" id="phone" name="phone" placeholder="e.g. 08123456789" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-slate-900 text-sm placeholder-slate-400 focus:bg-white focus:outline-none focus:border-slate-800 focus:ring-2 focus:ring-slate-800/10 transition-all shadow-sm">
                    </div>
                    <p class="text-[11px] text-slate-400 mt-1">Make sure the number is active on WhatsApp.</p>
                </div>

                <!-- Division -->
                <div>
                    <label for="division" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">
                        English Division <span class="text-amber-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path>
                            </svg>
                        </div>
                        <select id="division" name="division" required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-10 py-3 text-slate-900 text-sm appearance-none focus:bg-white focus:outline-none focus:border-slate-800 focus:ring-2 focus:ring-slate-800/10 transition-all shadow-sm">
                            <option value="" disabled selected>Select your preferred division...</option>
                            <option value="Debate">🗣️ Debate</option>
                            <option value="Sing a Song">🎤 Sing a Song</option>
                            <option value="Speech and Poem">📜 Speech and Poem</option>
                            <option value="Storytelling">📖 Storytelling</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3.5 text-slate-400">
                            <svg class="h-4 w-4 fill-current" viewBox="0 0 20 20">
                                <path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"/>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Reason -->
                <div>
                    <label for="reason" class="block text-xs font-bold uppercase tracking-wider text-slate-600 mb-1.5">
                        Why do you want to join? <span class="text-amber-500">*</span>
                    </label>
                    <div class="relative">
                        <div class="absolute top-3.5 left-0 pl-3.5 flex items-start pointer-events-none text-slate-400">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                            </svg>
                        </div>
                        <textarea id="reason" name="reason" rows="3" placeholder="Tell us your motivation or what you hope to achieve..." required
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-11 pr-4 py-3 text-slate-900 text-sm placeholder-slate-400 focus:bg-white focus:outline-none focus:border-slate-800 focus:ring-2 focus:ring-slate-800/10 transition-all shadow-sm resize-y min-h-[100px]"></textarea>
                    </div>
                </div>

                <!-- Submit Button -->
                <div class="pt-3">
                    <button type="submit" id="submitBtn" 
                        class="w-full bg-slate-900 hover:bg-slate-800 text-white font-semibold text-sm rounded-xl py-3.5 px-6 transition-all duration-200 shadow-md hover:shadow-lg disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2 group">
                        <span class="btn-text">Register Now</span>
                        <svg class="btn-icon w-4 h-4 transform group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                        <div class="loader hidden items-center justify-center gap-2">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                            <span>Submitting...</span>
                        </div>
                    </button>
                </div>
            </form>
        </div>

        <!-- Footer -->
        <footer class="text-center mt-6 text-xs text-slate-400">
            <p>&copy; English Club SMEA. Built with passion for excellence.</p>
        </footer>

    </main>

    <!-- Configuration & Logic -->
    <script src="config.js"></script>
    <script src="app.js"></script>
</body>
</html>
